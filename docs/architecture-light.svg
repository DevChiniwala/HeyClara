  <text x="915" y="478" text-anchor="middle" font-family="system-ui" font-size="9" fill="#92400e">Jobs</text>
  <text x="915" y="492" text-anchor="middle" font-family="system-ui" font-size="9" fill="#92400e">Messages + Sessions</text>

  <rect x="995" y="440" width="140" height="65" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1065" y="462" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#78350f">~/.heyclara/</text>
  <text x="1065" y="478" text-anchor="middle" font-family="system-ui" font-size="9" fill="#92400e">Config + Persona</text>
  <text x="1065" y="492" text-anchor="middle" font-family="system-ui" font-size="9" fill="#92400e">Job State + Watches</text>

  <rect x="845" y="520" width="290" height="55" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="990" y="542" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#78350f">Persona Files (loaded every session)</text>
  <text x="990" y="560" text-anchor="middle" font-family="system-ui" font-size="9" fill="#92400e">identity.md | owner.md | soul.md | rules.md | memory.md</text>

  <!-- Connection lines: Daemon to AI -->
