  <line x1="760" y1="500" x2="820" y2="500" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>

  <!-- Connection lines: AI to Persistence -->
  <line x1="990" y1="340" x2="990" y2="390" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Legend -->
