  <text x="500" y="137" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#5b21b6">Chat Engine</text>
  <text x="500" y="153" text-anchor="middle" font-family="system-ui" font-size="9" fill="#7c3aed">Sessions + Streaming</text>

  <rect x="585" y="115" width="150" height="48" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="660" y="137" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#5b21b6">Identity Loader</text>
  <text x="660" y="153" text-anchor="middle" font-family="system-ui" font-size="9" fill="#7c3aed">Persona + Skills</text>

  <rect x="425" y="178" width="150" height="48" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="500" y="200" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#5b21b6">Job Scheduler</text>
  <text x="500" y="216" text-anchor="middle" font-family="system-ui" font-size="9" fill="#7c3aed">Cron + Interval + Once</text>

  <rect x="585" y="178" width="150" height="48" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="660" y="200" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#5b21b6">MCP Server</text>
  <text x="660" y="216" text-anchor="middle" font-family="system-ui" font-size="9" fill="#7c3aed">24 Tools</text>

  <rect x="425" y="241" width="150" height="48" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="500" y="263" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#5b21b6">Session Finalizer</text>
  <text x="500" y="279" text-anchor="middle" font-family="system-ui" font-size="9" fill="#7c3aed">Consolidator + Summary</text>

