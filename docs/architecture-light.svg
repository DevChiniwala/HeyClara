  <text x="915" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#059669">Marketer, Dev, Custom</text>

  <rect x="995" y="195" width="140" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="1065" y="217" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#064e3b">OpenAI Realtime</text>
  <text x="1065" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#059669">Voice Audio Bridge</text>

  <rect x="845" y="260" width="290" height="50" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="990" y="282" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#064e3b">Gemini (Image Generation)</text>
  <text x="990" y="300" text-anchor="middle" font-family="system-ui" font-size="9" fill="#059669">Visual identity + general-purpose images</text>

  <!-- Failover arrow -->
  <path d="M 985 155 L 995 155" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="990" y="125" text-anchor="middle" font-family="system-ui" font-size="8" fill="#dc2626">failover</text>

  <!-- PERSISTENCE -->
  <rect x="820" y="390" width="340" height="220" rx="16" fill="white" stroke="url(#orangeGrad)" stroke-width="2" filter="url(#shadow)"/>
  <rect x="820" y="390" width="340" height="36" rx="16" fill="url(#orangeGrad)"/>
  <rect x="820" y="410" width="340" height="16" fill="url(#orangeGrad)"/>
  <text x="990" y="414" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="white" letter-spacing="1">PERSISTENCE</text>

  <rect x="845" y="440" width="140" height="65" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
