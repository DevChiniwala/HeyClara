  <text x="915" y="170" text-anchor="middle" font-family="system-ui" font-size="9" fill="#059669">query() + streaming</text>

  <rect x="995" y="130" width="140" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="1065" y="152" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#064e3b">Codex CLI</text>
  <text x="1065" y="170" text-anchor="middle" font-family="system-ui" font-size="9" fill="#059669">Failover Backend</text>

  <rect x="845" y="195" width="140" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
