  <text x="477" y="412" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5b21b6">staging.md</text>
  <text x="530" y="412" text-anchor="middle" font-family="system-ui" font-size="14" fill="#8b5cf6">&#x2192;</text>
  <rect x="545" y="393" width="85" height="30" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="587" y="412" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5b21b6">promote</text>
  <text x="640" y="412" text-anchor="middle" font-family="system-ui" font-size="14" fill="#8b5cf6">&#x2192;</text>
  <rect x="655" y="393" width="70" height="30" rx="6" fill="#d8b4fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="690" y="412" text-anchor="middle" font-family="system-ui" font-size="9" fill="#3b0764">permanent</text>

