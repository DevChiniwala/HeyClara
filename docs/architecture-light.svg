<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e1b4b">HeyClara System Architecture</text>

  <!-- YOU node -->
  <circle cx="100" cy="360" r="40" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="100" y="355" text-anchor="middle" font-family="system-ui" font-size="24" fill="white">You</text>
  <text x="100" y="375" text-anchor="middle" font-family="system-ui" font-size="10" fill="#c7d2fe">Owner</text>

  <!-- Channel boxes -->
  <g filter="url(#shadow)">
    <rect x="200" y="80" width="140" height="56" rx="12" fill="white" stroke="#ec4899" stroke-width="2"/>
    <text x="270" y="105" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#831843">Telegram</text>
    <text x="270" y="122" text-anchor="middle" font-family="system-ui" font-size="10" fill="#9ca3af">grammY</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="200" y="160" width="140" height="56" rx="12" fill="white" stroke="#ec4899" stroke-width="2"/>
    <text x="270" y="185" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#831843">Slack</text>
    <text x="270" y="202" text-anchor="middle" font-family="system-ui" font-size="10" fill="#9ca3af">Bolt + Socket Mode</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="200" y="240" width="140" height="56" rx="12" fill="white" stroke="#ec4899" stroke-width="2"/>
    <text x="270" y="265" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#831843">Voice &amp; SMS</text>
    <text x="270" y="282" text-anchor="middle" font-family="system-ui" font-size="10" fill="#9ca3af">Twilio + OpenAI RT</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="200" y="320" width="140" height="56" rx="12" fill="white" stroke="#ec4899" stroke-width="2"/>
    <text x="270" y="345" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#831843">WhatsApp</text>
    <text x="270" y="362" text-anchor="middle" font-family="system-ui" font-size="10" fill="#9ca3af">Twilio Sandbox</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="200" y="400" width="140" height="56" rx="12" fill="white" stroke="#ec4899" stroke-width="2"/>
    <text x="270" y="425" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#831843">Terminal</text>
    <text x="270" y="442" text-anchor="middle" font-family="system-ui" font-size="10" fill="#9ca3af">REPL CLI</text>
  </g>

