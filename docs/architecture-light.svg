  <line x1="340" y1="108" x2="400" y2="328" stroke="#ec4899" stroke-width="1.5" opacity="0.5"/>
  <line x1="340" y1="188" x2="400" y2="328" stroke="#ec4899" stroke-width="1.5" opacity="0.5"/>
  <line x1="340" y1="268" x2="400" y2="328" stroke="#ec4899" stroke-width="1.5" opacity="0.5"/>
  <line x1="340" y1="348" x2="400" y2="328" stroke="#ec4899" stroke-width="1.5" opacity="0.5"/>
  <line x1="340" y1="428" x2="400" y2="328" stroke="#ec4899" stroke-width="1.5" opacity="0.5"/>

