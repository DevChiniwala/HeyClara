  <line x1="140" y1="350" x2="200" y2="188" stroke="#818cf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="140" y1="360" x2="200" y2="268" stroke="#818cf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="140" y1="370" x2="200" y2="348" stroke="#818cf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="140" y1="380" x2="200" y2="428" stroke="#818cf8" stroke-width="1.5" opacity="0.4"/>

  <!-- DAEMON box -->
  <rect x="400" y="60" width="360" height="550" rx="20" fill="#16162a" stroke="url(#purpleGradD)" stroke-width="2.5" filter="url(#shadowD)"/>
  <rect x="400" y="60" width="360" height="40" rx="20" fill="url(#purpleGradD)"/>
  <rect x="400" y="80" width="360" height="20" fill="url(#purpleGradD)"/>
  <text x="580" y="86" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="700" fill="white" letter-spacing="1">HEYCLARA DAEMON (Bun.js)</text>

