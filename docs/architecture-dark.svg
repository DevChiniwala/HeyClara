  <text x="915" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#34d399">Marketer, Dev, Custom</text>

  <rect x="995" y="195" width="140" height="50" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
  <text x="1065" y="217" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#6ee7b7">OpenAI Realtime</text>
  <text x="1065" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#34d399">Voice Audio Bridge</text>

  <rect x="845" y="260" width="290" height="50" rx="8" fill="#065f46" stroke="#10b981" stroke-width="1.5"/>
  <text x="990" y="282" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#6ee7b7">Gemini (Image Generation)</text>
  <text x="990" y="300" text-anchor="middle" font-family="system-ui" font-size="9" fill="#34d399">Visual identity + general-purpose images</text>

  <!-- Failover label -->
  <text x="990" y="125" text-anchor="middle" font-family="system-ui" font-size="8" fill="#f87171">failover</text>

