  <text x="915" y="170" text-anchor="middle" font-family="system-ui" font-size="9" fill="#34d399">query() + streaming</text>

  <rect x="995" y="130" width="140" height="50" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
