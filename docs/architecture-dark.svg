<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bgGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purpleGradD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="blueGradD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="greenGradD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="orangeGradD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="pinkGradD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="shadowD" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glowD" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" rx="16" fill="url(#bgGradDark)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e1e3f" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="720" fill="url(#grid)" opacity="0.3"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#e2e8f0">HeyClara System Architecture</text>

  <!-- YOU node -->
  <circle cx="100" cy="360" r="40" fill="url(#blueGradD)" filter="url(#shadowD)"/>
  <text x="100" y="355" text-anchor="middle" font-family="system-ui" font-size="24" fill="white">You</text>
  <text x="100" y="375" text-anchor="middle" font-family="system-ui" font-size="10" fill="#c7d2fe">Owner</text>

  <!-- Channel boxes -->
  <g filter="url(#shadowD)">
    <rect x="200" y="80" width="140" height="56" rx="12" fill="#1e1e3f" stroke="#f472b6" stroke-width="2"/>
    <text x="270" y="105" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#f9a8d4">Telegram</text>
    <text x="270" y="122" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b7280">grammY</text>
  </g>
  <g filter="url(#shadowD)">
    <rect x="200" y="160" width="140" height="56" rx="12" fill="#1e1e3f" stroke="#f472b6" stroke-width="2"/>
    <text x="270" y="185" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#f9a8d4">Slack</text>
    <text x="270" y="202" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b7280">Bolt + Socket Mode</text>
  </g>
  <g filter="url(#shadowD)">
    <rect x="200" y="240" width="140" height="56" rx="12" fill="#1e1e3f" stroke="#f472b6" stroke-width="2"/>
    <text x="270" y="265" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#f9a8d4">Voice &amp; SMS</text>
    <text x="270" y="282" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b7280">Twilio + OpenAI RT</text>
  </g>
  <g filter="url(#shadowD)">
    <rect x="200" y="320" width="140" height="56" rx="12" fill="#1e1e3f" stroke="#f472b6" stroke-width="2"/>
    <text x="270" y="345" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#f9a8d4">WhatsApp</text>
    <text x="270" y="362" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b7280">Twilio Sandbox</text>
  </g>
  <g filter="url(#shadowD)">
    <rect x="200" y="400" width="140" height="56" rx="12" fill="#1e1e3f" stroke="#f472b6" stroke-width="2"/>
    <text x="270" y="425" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#f9a8d4">Terminal</text>
    <text x="270" y="442" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b7280">REPL CLI</text>
  </g>

  <!-- Channel label -->
  <text x="270" y="68" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#f472b6" letter-spacing="1">CHANNELS</text>

