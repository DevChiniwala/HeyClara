  <text x="915" y="478" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fbbf24">Jobs</text>
  <text x="915" y="492" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fbbf24">Messages + Sessions</text>

  <rect x="995" y="440" width="140" height="65" rx="8" fill="#292524" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1065" y="462" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#fde68a">~/.heyclara/</text>
  <text x="1065" y="478" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fbbf24">Config + Persona</text>
  <text x="1065" y="492" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fbbf24">Job State + Watches</text>

  <rect x="845" y="520" width="290" height="55" rx="8" fill="#1c1917" stroke="#d97706" stroke-width="1"/>
