  <text x="500" y="153" text-anchor="middle" font-family="system-ui" font-size="9" fill="#8b5cf6">Sessions + Streaming</text>

  <rect x="585" y="115" width="150" height="48" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="660" y="137" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#c4b5fd">Identity Loader</text>
  <text x="660" y="153" text-anchor="middle" font-family="system-ui" font-size="9" fill="#8b5cf6">Persona + Skills</text>

  <rect x="425" y="178" width="150" height="48" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1.5"/>
