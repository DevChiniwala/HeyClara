  <text x="660" y="200" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#c4b5fd">MCP Server</text>
  <text x="660" y="216" text-anchor="middle" font-family="system-ui" font-size="9" fill="#8b5cf6">24 Tools</text>

