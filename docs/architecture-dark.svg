  <text x="530" y="412" text-anchor="middle" font-family="system-ui" font-size="14" fill="#a78bfa">&#x2192;</text>
  <rect x="545" y="393" width="85" height="30" rx="6" fill="#2e1065" stroke="#8b5cf6" stroke-width="1"/>
  <text x="587" y="412" text-anchor="middle" font-family="system-ui" font-size="9" fill="#c4b5fd">promote</text>
  <text x="640" y="412" text-anchor="middle" font-family="system-ui" font-size="14" fill="#a78bfa">&#x2192;</text>
  <rect x="655" y="393" width="70" height="30" rx="6" fill="#581c87" stroke="#a855f7" stroke-width="1"/>
  <text x="690" y="412" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e9d5ff">permanent</text>

